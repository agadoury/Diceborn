<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg" />

    <!-- Mobile-first viewport: cover the notch, lock zoom, account for dynamic UA chrome. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1"
    />
    <meta name="theme-color" content="#0E0814" />

    <!-- iOS standalone mode -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pact of Heroes" />

    <meta name="description" content="Pact of Heroes — Hearthstone with dice. A 1v1 dice-and-card combat game." />

    <title>Pact of Heroes</title>

    <!-- Fonts: display, body, numeric. Preconnect to keep first paint snappy. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600;700&family=Rubik:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <noscript>Pact of Heroes requires JavaScript.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
